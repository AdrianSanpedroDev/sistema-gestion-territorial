<mat-card class="cardWithShadow mb-0!">
  <mat-card-header>
    <mat-card-title>Resultado del Reporte</mat-card-title>
  </mat-card-header>
  <mat-card-content>

    @if (!reportData) {
      <div class="flex flex-col items-center justify-center py-12 gap-4">
        <p class="text-gray-400 text-sm">Esperando consulta...</p>
      </div>
    } @else if (isEmpty) {
      <div class="flex flex-col items-center justify-center py-12 gap-4">
        <p class="text-gray-400 text-sm">Sin datos para esta consulta.</p>
      </div>
    } @else {
      <apx-chart
        #chart
        [series]="chartOptions!.series!"
        [chart]="chartOptions!.chart!"
        [xaxis]="$any(chartOptions!.xaxis)"
        [plotOptions]="$any(chartOptions!.plotOptions)"
        [labels]="$any(chartOptions!.labels)"
        [dataLabels]="chartOptions!.dataLabels!"
        [tooltip]="chartOptions!.tooltip!"
        [grid]="$any(chartOptions!.grid)"
        [legend]="$any(chartOptions!.legend)">
      </apx-chart>
    }

  </mat-card-content>
</mat-card>
