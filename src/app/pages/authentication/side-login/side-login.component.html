<div class="flex h-screen w-full items-center justify-center overflow-hidden p-2">
  <mat-card class="cardWithShadow overflow-hidden auth-card mx-auto mb-0">
    <div class="grid grid-cols-12 gap-6">

      <div class="lg:col-span-6 col-span-12 flex items-stretch">
        <div class="w-full p-10 flex flex-col justify-center gap-6">

          <div class="text-center">
            <img src="/assets/images/logos/dark-logo.svg" alt="logo" class="mx-auto mb-4 h-12" />
            <h2 class="text-2xl font-bold">Sistema de Gestión Territorial</h2>
            <p class="text-gray-500 mt-2">Inicia sesión para continuar</p>
          </div>

          <div class="flex flex-col gap-4">
            <button
              mat-stroked-button
              class="w-full py-2"
              [disabled]="loading"
              (click)="loginWith('google')">
              <div class="flex items-center gap-3 px-2">
                <img src="/assets/images/svgs/google-icon.svg" alt="Google" class="w-5 h-5" />
                <span>Continuar con Google</span>
              </div>
            </button>

            <button
              mat-stroked-button
              class="w-full py-2"
              [disabled]="loading"
              (click)="loginWith('github')">
              <div class="flex items-center gap-3 px-2">
                <img src="/assets/images/svgs/github-icon.svg" alt="GitHub" class="w-5 h-5" />
                <span>Continuar con GitHub</span>
              </div>
            </button>
          </div>

          @if (loading) {
            <p class="text-center text-gray-400 text-sm">Iniciando sesión...</p>
          }

        </div>
      </div>

      <div class="lg:col-span-6 col-span-12 relative hidden lg:flex justify-center items-stretch bg-light p-5">
        <div class="flex items-center justify-center w-full">
          <img src="/assets/images/backgrounds/login-bg.svg" alt="login" class="img-fluid object-cover" />
        </div>
      </div>

    </div>
  </mat-card>
</div>
