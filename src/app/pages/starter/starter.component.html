<div class="p-6 flex flex-col gap-6">

  <div>
    <h2 class="text-2xl font-semibold">Bienvenido</h2>
    <p class="text-gray-500 mt-1">Sistema de Gestión Territorial — selecciona un módulo para comenzar.</p>
  </div>

  <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
    @for (module of modules; track module.route) {
      <mat-card
        class="cardWithShadow cursor-pointer hover:scale-[1.02] transition-transform"
        (click)="navigateTo(module.route)">
        <mat-card-content class="flex items-center gap-4 py-4!">
          <span class="iconify text-4xl text-primary" [attr.data-icon]="module.icon"></span>
          <div>
            <p class="font-semibold text-base">{{ module.title }}</p>
            <p class="text-gray-500 text-sm">{{ module.description }}</p>
          </div>
        </mat-card-content>
      </mat-card>
    }
  </div>

</div>
