<div class="p-6">
  <app-filter-bar 
    title="Gestionar Barrios" 
    addButtonLabel="Agregar Barrio" 
    (addClicked)="openModal('create')">
    
    <div class="flex flex-col">
      <label class="text-sm font-medium text-gray-700">Buscar</label>
      <input type="text" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm px-3 py-2 border focus:ring-blue-500 focus:border-blue-500 sm:text-sm" placeholder="Buscar barrio..." (input)="onSearch($event)">
    </div>

    <div class="flex flex-col">
      <label class="text-sm font-medium text-gray-700">Comuna</label>
      <select class="mt-1 block w-full rounded-md border-gray-300 shadow-sm px-3 py-2 border focus:ring-blue-500 focus:border-blue-500 sm:text-sm" (change)="onFilterChange($event)">
        <option value="">Todas las comunas</option>
        <option *ngFor="let c of communes" [value]="c.id">{{ c.name }}</option>
      </select>
    </div>
  </app-filter-bar>

  <app-dynamic-table 
    [columns]="columns" 
    [actions]="actions" 
    [data]="neighborhoods" 
    [page]="page" 
    [pageSize]="pageSize" 
    [totalItems]="totalItems" 
    [loading]="loading"
    (pageChange)="onPageChange($event)" 
    (action)="handleAction($event)">
  </app-dynamic-table>

  <app-generic-modal 
    [isOpen]="isModalOpen" 
    [title]="modalMode === 'create' ? 'Agregar Nuevo Barrio' : 'Editar Barrio'" 
    [isSaveDisabled]="form.invalid || loading"
    (closeModal)="closeModal()" 
    (saveChanges)="saveNeighborhood()">
    
    <form [formGroup]="form" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700">Comuna</label>
        <select formControlName="id_commune" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm px-3 py-2 border focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
          <option value="">Seleccione una comuna</option>
          <option *ngFor="let c of communes" [value]="c.id">{{ c.name }}</option>
        </select>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700">Nombre del Barrio</label>
        <input type="text" formControlName="name" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm px-3 py-2 border focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700">Estado</label>
        <select formControlName="status" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm px-3 py-2 border focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
          <option value="active">Activo</option>
          <option value="inactive">Inactivo</option>
        </select>
      </div>
    </form>
  </app-generic-modal>
</div>
